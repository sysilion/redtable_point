<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Table Map</title>
  <style>
    :root {
      --cat-한식-bg: #FFF3E0; --cat-한식-text: #E65100;
      --cat-양식-bg: #E8F5E9; --cat-양식-text: #2E7D32;
      --cat-카페-bg: #FFF8E1; --cat-카페-text: #F57F17;
      --cat-중식-bg: #FBE9E7; --cat-중식-text: #BF360C;
      --cat-뷰티-bg: #FCE4EC; --cat-뷰티-text: #C2185B;
      --cat-일식-bg: #E3F2FD; --cat-일식-text: #1565C0;
      --cat-베이커리-bg: #FCE4EC; --cat-베이커리-text: #D81B60;
      --cat-서프샵-bg: #E0F2F1; --cat-서프샵-text: #00695C;
      --cat-기타-bg: #F5F5F5; --cat-기타-text: #616161;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --bg-blur: rgba(255, 255, 255, 0.8);
      --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #map { width: 100%; height: 100%; }
    
    .store-popup { width: 300px; padding: var(--space-lg); border-radius: var(--radius-md); background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); word-break: keep-all; border: 1px solid #eee; }
    .store-popup h3 { margin: 0 0 var(--space-sm); font-size: 18px; color: #1a1a1a; font-weight: 700; }
    .store-popup p { margin: var(--space-xs) 0; font-size: 14px; color: #666; display: flex; align-items: center; gap: 6px; }
    .category-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-right: var(--space-xs); margin-bottom: var(--space-sm); }
    .cat-한식 { background: var(--cat-한식-bg); color: var(--cat-한식-text); }
    .cat-양식 { background: var(--cat-양식-bg); color: var(--cat-양식-text); }
    .cat-카페 { background: var(--cat-카페-bg); color: var(--cat-카페-text); }
    .cat-중식 { background: var(--cat-중식-bg); color: var(--cat-중식-text); }
    .cat-뷰티 { background: var(--cat-뷰티-bg); color: var(--cat-뷰티-text); }
    .cat-일식 { background: var(--cat-일식-bg); color: var(--cat-일식-text); }
    .cat-베이커리 { background: var(--cat-베이커리-bg); color: var(--cat-베이커리-text); }
    .cat-서프샵 { background: var(--cat-서프샵-bg); color: var(--cat-서프샵-text); }
    .cat-기타 { background: var(--cat-기타-bg); color: var(--cat-기타-text); }
    .popup-cta-button { display: block; width: 100%; padding: 12px; background: #e74c3c; color: white; text-align: center; border-radius: 8px; text-decoration: none; font-weight: 600; margin-top: var(--space-md); transition: background 0.2s ease, transform 0.1s ease; }
    .popup-cta-button:hover { background: #c0392b; transform: translateY(-1px); }

    #status { position: fixed; bottom: var(--space-md); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #fff; padding: var(--space-xs) var(--space-md); border-radius: 6px; font-size: 13px; z-index: 1000; display: none; }
    .sidebar-item { cursor: pointer; padding: var(--space-md); border-bottom: 1px solid #eee; }
    .sidebar-item:hover { background: #f9f9f9; }
    .sidebar-item h3 { font-size: 15px; margin: 0 0 var(--space-xs); }
    .sidebar-item p { font-size: 12px; color: #666; margin: 0; }
    
    #sidebar { position: absolute; top: 0; left: 0; width: 300px; height: 100%; background: var(--bg-blur); backdrop-filter: blur(10px); z-index: 1000; box-shadow: var(--shadow-soft); transition: transform 0.3s; border-radius: 0 var(--radius-lg) var(--radius-lg) 0; }
    @media (max-width: 600px) {
      #sidebar { width: 100%; }
    }
    #sidebar.collapsed { transform: translateX(-100%); }
    .sidebar-tabs { position: fixed; top: 20px; left: 20px; z-index: 1101; background: white; border: none; border-radius: 50px; padding: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); display: flex; gap: 6px; }
    .sidebar-tabs div { cursor: pointer; padding: 10px; background: #f8f9fa; border-radius: 50%; transition: all 0.2s; font-size: 20px; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; }
    .sidebar-tabs div:hover { background: #eee; transform: scale(1.1); }
    .sidebar-content { height: 100%; overflow-y: auto; }
    .sidebar-pane { padding: var(--space-lg); }
    .sidebar-header { font-size: 18px; margin-bottom: var(--space-lg); display: flex; justify-content: space-between; }
    .sidebar-close { cursor: pointer; }
    
    .filter-chip {
      display: inline-block;
      padding: var(--space-xs) var(--space-md);
      margin: var(--space-xs);
      border-radius: var(--radius-md);
      cursor: pointer;
      background: #eee;
      transition: background 0.2s;
      font-size: 13px;
    }
    .filter-chip.active {
      background: #333;
      color: white;
    }
    #search-container { position: absolute; top: 10px; left: 60px; z-index: 1100; display: flex; flex-direction: column; gap: var(--space-xs); }
    .search-wrapper { display: flex; align-items: center; background: white; border-radius: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); padding: 4px 12px; width: 250px; }
    #search-input { border: none; outline: none; padding: 8px; width: 100%; font-size: 14px; }
    #clear-search { background: none; border: none; cursor: pointer; color: #999; font-size: 16px; padding: 0 4px; }
    #result-count { font-size: 12px; color: #666; padding-left: 12px; }
  </style>
</head>
<body>
  <div class="sidebar-tabs">
      <div onclick="toggleSidebar()">☰</div>
      <div onclick="toggleSidebar('filter')">🏷️</div>
    </div>
    <div id="sidebar">
    <div class="sidebar-content">
      <div class="sidebar-pane" id="home">
        <div class="sidebar-header">
          <span id="store-count-header">매장</span>
          <span class="sidebar-close" onclick="toggleSidebar()">◀</span>
        </div>
        <div id="sidebar-content"></div>
      </div>
      <div class="sidebar-pane" id="filter" style="display:none;">
        <div class="sidebar-header">
          필터
          <span class="sidebar-close" onclick="toggleSidebar()">◀</span>
        </div>
        <div id="filter-content"></div>
      </div>
    </div>
  </div>
  
  <div id="search-container">
    <div class="search-wrapper">
      <input type="text" id="search-input" placeholder="가게 이름 또는 주소 검색">
      <button id="clear-search" style="display:none;">✕</button>
    </div>
    <div id="result-count"></div>
  </div>
  
  <div id="map"></div>
  <div id="status">Loading map data...</div>
  
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=608c740734f775a41a0b360ae3c5f32b&libraries=services,clusterer&autoload=false"></script>
  <script>
    function esc(str) {
      var temp = document.createElement('div');
      temp.textContent = str;
      return temp.innerHTML;
    }

    var markerCache = {};

    function createEmojiMarkerImage(emoji, size = 48) {
      var dpr = window.devicePixelRatio || 1;
      var cacheKey = emoji + '-' + size + '-' + dpr;
      if (markerCache[cacheKey]) {
        return markerCache[cacheKey];
      }

      var canvas = document.createElement('canvas');
      canvas.width = size * dpr;
      canvas.height = size * dpr;
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      // 1. 핀 모양(물방울) 그리기
      ctx.beginPath();
      ctx.moveTo(size / 2, size); // 하단 뾰족한 점
      ctx.bezierCurveTo(0, size / 2, 0, 0, size / 2, 0);
      ctx.bezierCurveTo(size, 0, size, size / 2, size / 2, size);
      ctx.closePath();
      
      // 핀 색상 및 그림자
      ctx.fillStyle = 'white';
      ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetY = 2;
      ctx.fill();
      
      // 2. 내부 원형 영역 (에모지가 들어갈 자리)
      ctx.shadowColor = 'transparent';
      ctx.beginPath();
      ctx.arc(size / 2, size / 3, size / 4, 0, Math.PI * 2);
      ctx.fillStyle = '#fdfdfd';
      ctx.fill();
      ctx.strokeStyle = '#eee';
      ctx.lineWidth = 1;
      ctx.stroke();
      
      // 3. 에모지 배치
      ctx.font = (size * 0.25) + 'px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(emoji, size / 2, size / 3);
      
      var dataUrl = canvas.toDataURL();
      markerCache[cacheKey] = dataUrl;
      return dataUrl;
    }
    
    kakao.maps.load(function() {
      (function () {
        var mapContainer = document.getElementById('map'),
            mapOption = { 
                center: new kakao.maps.LatLng(37.535, 126.897),
                level: 13,
                maxZoom: 20
            };
        var map = new kakao.maps.Map(mapContainer, mapOption);
        
        // Use native grab cursor to eliminate slow CDN request for openhand.cur.ico
        map.setCursor('grab');

        kakao.maps.event.addListener(map, 'click', () => {
          sharedOverlay.setMap(null);
        });

        var clusterer = new kakao.maps.MarkerClusterer({
            map: map,
            averageCenter: true,
            minLevel: 10
        });

        var categoryIcons = {
          "한식": "🍚",
          "양식": "🍝",
          "카페": "☕",
          "중식": "🍜",
          "뷰티": "💄",
          "일식": "🍣",
          "베이커리": "🍞",
          "서프샵": "🏄",
          "기타": "📌"
        };

        var allMarkers = [];
        var activeCategories = new Set(Object.keys(categoryIcons));
        var searchTerm = "";
        var sharedOverlay = new kakao.maps.CustomOverlay({
          zIndex: 1000
        });

        window.toggleSidebar = function(pane) {
          var sidebar = document.getElementById('sidebar');
          sidebar.classList.toggle('collapsed');
          var targetPane = pane || 'home';
          document.getElementById('home').style.display = targetPane === 'home' ? 'block' : 'none';
          document.getElementById('filter').style.display = targetPane === 'filter' ? 'block' : 'none';
        };

        function getPrimaryLink(p) {
          try {
            var links = JSON.parse(p.link || '[]');
            if (links.length === 0) return null;
            var redtableLink = links.find(function(l) { return l.source === 'redtable'; });
            return redtableLink ? redtableLink.link : links[0].link;
          } catch (e) {
            return null;
          }
        }

        function getLinksHtml(p) {
          try {
            var links = JSON.parse(p.link || '[]');
            if (links.length === 0) return '';
            
            // Sort: redtable first, then others alphabetically by source
            links.sort(function(a, b) {
              if (a.source === 'redtable') return -1;
              if (b.source === 'redtable') return 1;
              return (a.source || '').localeCompare(b.source || '');
            });
            
            var html = '<div style="margin-top: 8px; border-top: 1px solid #eee; padding-top: 8px;">';
            links.forEach(function(l) {
              var sourceName = l.source === 'redtable' ? 'RedTable (메인)' : (l.source === 'ydp' ? '영등포구청' : (l.source === 'benepia' ? 'Benepia' : esc(l.source)));
              html += '<p style="margin: 2px 0; font-size: 12px;"><a href="' + esc(l.link) + '" target="_blank">🔗 ' + sourceName + '</a></p>';
            });
            html += '</div>';
            return html;
          } catch (e) {
            return '';
          }
        }

        function createPopupContent(p) {
           var categoriesHtml = (p.categories || []).map(cat => 
             '<span class="category-badge cat-' + esc(cat) + '">' + esc(cat) + '</span>'
           ).join('');
          
           var link = getPrimaryLink(p);
           var ctaHtml = link ? '<a href="' + esc(link) + '" target="_blank" class="popup-cta-button">방문하기</a>' : '';
           
           return '<div class="store-popup" onclick="event.stopPropagation();">' +
                  '<h3>' + esc(p.title || 'Untitled') + '</h3>' +
                  '<div>' + categoriesHtml + '</div>' +
                  '<p>📍 ' + esc(p.address) + '</p>' +
                  (p.phone ? '<p>📞 ' + esc(p.phone) + '</p>' : '') +
                  getLinksHtml(p) +
                  ctaHtml +
                  '</div>';
        }

        function openPopup(marker, feature) {
          var p = feature.properties;
          sharedOverlay.setContent(createPopupContent(p));
          sharedOverlay.setPosition(marker.getPosition());
          sharedOverlay.setMap(map);
        }

        fetch('data/map_data.json')
          .then(res => res.json())
          .then(geojson => {
            document.getElementById('status').style.display = 'none';
            var sidebarContent = document.getElementById('sidebar-content');
            
            // Normalize categories for all features
            geojson.features.forEach(feature => {
              var p = feature.properties;
              if (p.category === 'nan') p.category = '기타';
              p.categories = p.category.split(',').map(s => s.trim());
            });
            // Deduplicate features by (title + address) combination
            var seen = new Set();
            geojson.features = geojson.features.filter(function(f) {
              var p = f.properties;
              var key = (p.title || '') + '::' + (p.address || '');
              if (seen.has(key)) return false;
              seen.add(key);
              return true;
            });

            geojson.features.forEach(feature => {
              var p = feature.properties;
              var latlng = new kakao.maps.LatLng(feature.geometry.coordinates[1], feature.geometry.coordinates[0]);
              
               var iconText = categoryIcons[p.categories[0]] || categoryIcons["기타"];
               
               var markerSize = 48;
               var marker = new kakao.maps.Marker({ 
                 position: latlng,
                 image: new kakao.maps.MarkerImage(createEmojiMarkerImage(iconText, markerSize), new kakao.maps.Size(markerSize, markerSize))
               });
               
               kakao.maps.event.addListener(marker, 'mouseover', () => {
                 marker.setImage(new kakao.maps.MarkerImage(createEmojiMarkerImage(iconText, markerSize + 8), new kakao.maps.Size(markerSize + 8, markerSize + 8)));
               });
               kakao.maps.event.addListener(marker, 'mouseout', () => {
                 marker.setImage(new kakao.maps.MarkerImage(createEmojiMarkerImage(iconText, markerSize), new kakao.maps.Size(markerSize, markerSize)));
               });
               
               kakao.maps.event.addListener(marker, 'click', () => {
                 openPopup(marker, feature);
               });
               
               allMarkers.push({ marker, feature });
             });
             
             updateMarkers();
           })
          .catch(err => {
            var status = document.getElementById('status');
            status.textContent = '데이터를 불러오는 중 오류가 발생했습니다. 페이지를 새로고침 해주세요.';
            status.style.display = 'block';
            status.style.color = 'red';
          });

        function updateSidebar() {
          var sidebarContent = document.getElementById('sidebar-content');
          sidebarContent.innerHTML = '';
          var filtered = allMarkers.filter(m => {
            var p = m.feature.properties;
            var match = (p.title || '').toLowerCase().includes(searchTerm) || (p.address || '').toLowerCase().includes(searchTerm);
            return match && (p.categories || []).some(function(cat) { return activeCategories.has(cat); });
          });
          document.getElementById('store-count-header').textContent = '매장 (' + filtered.length + ')';
          
          if (filtered.length === 0) {
            sidebarContent.innerHTML = '<div style="padding: 20px; text-align: center; color: #666;">검색 결과가 없습니다</div>';
            return;
          }

          filtered.forEach(m => {
            var p = m.feature.properties;
            var latlng = new kakao.maps.LatLng(m.feature.geometry.coordinates[1], m.feature.geometry.coordinates[0]);
            
             var categoriesHtml = (p.categories || []).map(cat => 
               '<span class="category-badge cat-' + esc(cat) + '">' + esc(cat) + '</span>'
             ).join('');

            var item = document.createElement('div');
            item.className = 'sidebar-item';
            item.innerHTML = '<h3>' + esc(p.title || 'Untitled') + '</h3>' +
                             '<div>' + categoriesHtml + '</div>' +
                             '<p>' + esc(p.address || '') + '</p>';
            item.onclick = (e) => {
              map.setCenter(latlng);
              map.setLevel(5);
              openPopup(m.marker, m.feature);
            };
            sidebarContent.appendChild(item);
          });
        }

        function updateMarkers() {
          clusterer.clear();
          var filtered = allMarkers.filter(m => {
            var p = m.feature.properties;
            var match = (p.title || '').toLowerCase().includes(searchTerm) || (p.address || '').toLowerCase().includes(searchTerm);
            return match && (p.categories || []).some(cat => activeCategories.has(cat));
          });
          clusterer.addMarkers(filtered.map(m => m.marker));
          
          updateResultCount(filtered.length);
          
          if (filtered.length > 0) {
            var bounds = new kakao.maps.LatLngBounds();
            filtered.forEach(m => bounds.extend(m.marker.getPosition()));
            map.setBounds(bounds);
          } else {
            // Show toast/overlay
            var status = document.getElementById('status');
            status.textContent = '검색 결과가 없습니다';
            status.style.display = 'block';
            setTimeout(() => { status.style.display = 'none'; }, 2000);
          }
          
          updateSidebar();
          updateFilterChips();
        }

        function updateFilterChips() {
          var filterContent = document.getElementById('filter-content');
          filterContent.innerHTML = '';
          
          // Add Select All / Deselect All
          var controls = document.createElement('div');
          controls.style.marginBottom = '10px';
          controls.innerHTML = '<button onclick="selectAll()">전체 선택</button> <button onclick="deselectAll()">전체 해제</button>';
          filterContent.appendChild(controls);

          Object.keys(categoryIcons).forEach(cat => {
            var count = allMarkers.filter(m => (m.feature.properties.categories || []).includes(cat)).length;
            var chip = document.createElement('div');
            chip.className = 'filter-chip' + (activeCategories.has(cat) ? ' active' : '');
            chip.textContent = categoryIcons[cat] + ' ' + cat + ' (' + count + ')';
            chip.onclick = (e) => {
              if (activeCategories.has(cat)) {
                activeCategories.delete(cat);
              } else {
                activeCategories.add(cat);
              }
              updateMarkers();
            };
            filterContent.appendChild(chip);
          });
        }

        window.selectAll = function() {
          Object.keys(categoryIcons).forEach(cat => activeCategories.add(cat));
          updateMarkers();
        };
        
        window.deselectAll = function() {
          activeCategories.clear();
          updateMarkers();
        };

        var searchInput = document.getElementById('search-input');
        var clearSearch = document.getElementById('clear-search');
        var resultCount = document.getElementById('result-count');
        var debounceTimer;

        function updateResultCount(count) {
          resultCount.textContent = count + '개 매장 검색됨';
        }

        searchInput.oninput = (e) => {
          clearSearch.style.display = e.target.value ? 'block' : 'none';
          
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(() => {
            searchTerm = e.target.value.toLowerCase();
            updateMarkers();
          }, 300);
        };

        clearSearch.onclick = () => {
          searchInput.value = '';
          clearSearch.style.display = 'none';
          searchTerm = '';
          updateMarkers();
        };
      })();
    });
  </script>
</body>
</html>
