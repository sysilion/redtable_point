<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Table Map</title>
  <style>
    :root {
      --cat-한식-bg: #FFF3E0; --cat-한식-text: #E65100;
      --cat-양식-bg: #E8F5E9; --cat-양식-text: #2E7D32;
      --cat-카페-bg: #FFF8E1; --cat-카페-text: #F57F17;
      --cat-중식-bg: #FBE9E7; --cat-중식-text: #BF360C;
      --cat-뷰티-bg: #FCE4EC; --cat-뷰티-text: #C2185B;
      --cat-일식-bg: #E3F2FD; --cat-일식-text: #1565C0;
      --cat-베이커리-bg: #FCE4EC; --cat-베이커리-text: #D81B60;
      --cat-서프샵-bg: #E0F2F1; --cat-서프샵-text: #00695C;
      --cat-기타-bg: #F5F5F5; --cat-기타-text: #616161;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --bg-blur: rgba(255, 255, 255, 0.8);
      --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.08);
      --sheet-bg: #ffffff;
      --sheet-radius-top: 24px;
      --accent-color: #e74c3c;
      --shadow-sheet: 0 -4px 20px rgba(0, 0, 0, 0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #map { width: 100%; height: 100%; }
    
    .store-popup { width: 300px; padding: var(--space-lg); border-radius: var(--radius-md); background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); word-break: keep-all; border: 1px solid #eee; }
    .store-popup h3 { margin: 0 0 var(--space-sm); font-size: 18px; color: #1a1a1a; font-weight: 700; }
    .store-popup p { margin: var(--space-xs) 0; font-size: 14px; color: #666; display: flex; align-items: center; gap: 6px; }
    .category-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-right: var(--space-xs); margin-bottom: var(--space-sm); }
    .cat-한식 { background: var(--cat-한식-bg); color: var(--cat-한식-text); }
    .cat-양식 { background: var(--cat-양식-bg); color: var(--cat-양식-text); }
    .cat-카페 { background: var(--cat-카페-bg); color: var(--cat-카페-text); }
    .cat-중식 { background: var(--cat-중식-bg); color: var(--cat-중식-text); }
    .cat-뷰티 { background: var(--cat-뷰티-bg); color: var(--cat-뷰티-text); }
    .cat-일식 { background: var(--cat-일식-bg); color: var(--cat-일식-text); }
    .cat-베이커리 { background: var(--cat-베이커리-bg); color: var(--cat-베이커리-text); }
    .cat-서프샵 { background: var(--cat-서프샵-bg); color: var(--cat-서프샵-text); }
    .cat-기타 { background: var(--cat-기타-bg); color: var(--cat-기타-text); }
    .popup-cta-button { display: block; width: 100%; padding: 12px; background: #e74c3c; color: white; text-align: center; border-radius: 8px; text-decoration: none; font-weight: 600; margin-top: var(--space-md); transition: background 0.2s ease, transform 0.1s ease; }
    .popup-cta-button:hover { background: #c0392b; transform: translateY(-1px); }

    #status { position: fixed; bottom: var(--space-md); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #fff; padding: var(--space-xs) var(--space-md); border-radius: 6px; font-size: 13px; z-index: 1000; display: none; }

    /* New App-Style Foundation */
    .top-nav { position: fixed; top: 0; left: 0; right: 0; padding: var(--space-md); z-index: 1100; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
    .floating-search { background: rgba(255, 255, 255, 0.5); border-radius: 24px; box-shadow: var(--shadow-soft); padding: var(--space-sm) var(--space-md); display: flex; align-items: center; }
    .category-pill-row { display: flex; gap: var(--space-sm); overflow-x: auto; padding: var(--space-sm) 0; scrollbar-width: none; -ms-overflow-style: none; }
    .category-pill-row::-webkit-scrollbar { display: none; }
    .category-pill { background: white; padding: var(--space-xs) var(--space-md); border-radius: 20px; box-shadow: var(--shadow-soft); white-space: nowrap; display: flex; align-items: center; gap: var(--space-xs); font-size: 14px; }

    .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--sheet-bg); border-radius: var(--sheet-radius-top) var(--sheet-radius-top) 0 0; box-shadow: var(--shadow-sheet); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); z-index: 1200; padding: var(--space-md); display: flex; flex-direction: column; overflow: hidden; max-height: 85vh; }
    .sheet-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto var(--space-md); cursor: grab; touch-action: none; }
    .sheet-tabs { display: flex; gap: var(--space-md); margin-bottom: var(--space-md); border-bottom: 1px solid #eee; }
    .sheet-tab { padding: var(--space-sm) 0; cursor: pointer; font-weight: 600; color: #666; }
    .sheet-tab.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); }

    .store-card { display: flex; gap: var(--space-md); padding: var(--space-md); background: white; border-radius: var(--radius-md); box-shadow: var(--shadow-soft); margin-bottom: var(--space-md); }
    .card-thumb { width: 80px; height: 80px; border-radius: var(--radius-md); background: #eee; flex-shrink: 0; }
    .card-thumb img { width: 100%; height: 100%; border-radius: var(--radius-md); object-fit: cover; }
    .card-info { flex-grow: 1; }
    .card-info h3 { font-size: 15px; margin: 0 0 var(--space-xs); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-info p { font-size: 12px; color: #666; margin: var(--space-xs) 0 0; }
    
    .bottom-sheet.state-collapsed { transform: translateY(calc(100% - 60px)); }
    .bottom-sheet.state-peek { transform: translateY(calc(100% - 35vh)); }
    .bottom-sheet.state-half { transform: translateY(calc(100% - 55vh)); }
    .bottom-sheet.state-full { transform: translateY(0); }
    
    .bottom-sheet .sheet-content { flex: 1; overflow-y: auto; min-height: 0; padding-bottom: 20px; }
    .category-pill.active { background: #333; color: white; }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-md); }
    .sheet-store-count { font-size: 13px; color: #666; }
  </style>
</head>
<body>
  <div class="top-nav">
    <div class="floating-search">
      <input type="text" id="search-input" placeholder="가게 이름 또는 주소 검색">
      <button id="clear-search" style="display:none;">✕</button>
    </div>
    <div class="category-pill-row" id="category-pill-row">
    </div>
  </div>
  
  <div id="map"></div>
  <div id="status">Loading map data...</div>
  
  <div id="bottom-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span>매장 목록</span>
      <span class="sheet-store-count" id="sheet-store-count"></span>
    </div>
    <div class="sheet-tabs">
      <div class="sheet-tab active" data-sort="default">기본순</div>
      <div class="sheet-tab" data-sort="coupon">📄 쿠폰</div>
      <div class="sheet-tab" data-sort="distance">거리순</div>
    </div>
    <div class="sheet-content" id="sheet-content"></div>
  </div>
  
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=608c740734f775a41a0b360ae3c5f32b&libraries=services,clusterer&autoload=false"></script>
  <script>
    function esc(str) {
      var temp = document.createElement('div');
      temp.textContent = str;
      return temp.innerHTML;
    }

    var markerCache = {};

    function createEmojiMarkerImage(emoji, bgColor, size = 48) {
      var dpr = window.devicePixelRatio || 1;
      var cacheKey = emoji + '-' + bgColor + '-' + size + '-' + dpr;
      if (markerCache[cacheKey]) {
        return markerCache[cacheKey];
      }

      var canvas = document.createElement('canvas');
      canvas.width = size * dpr;
      canvas.height = size * dpr;
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      // 1. 그림자 설정
      ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 4;

      // 2. 원 그리기
      ctx.beginPath();
      var radius = size / 2 - 4; // 4px padding for shadow/border
      ctx.arc(size / 2, size / 2, radius, 0, Math.PI * 2);
      ctx.fillStyle = bgColor;
      ctx.fill();
      
      // 3. 테두리
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // 4. 에모지 배치
      ctx.shadowColor = 'transparent'; // 에모지에는 그림자 없음
      ctx.font = (size * 0.5) + 'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(emoji, size / 2, size / 2);
      
      var dataUrl = canvas.toDataURL();
      markerCache[cacheKey] = dataUrl;
      return dataUrl;
    }
    
    kakao.maps.load(function() {
      (function () {
        var mapContainer = document.getElementById('map'),
            mapOption = { 
                center: new kakao.maps.LatLng(37.535, 126.897),
                level: 13,
                maxZoom: 20
            };
        var map = new kakao.maps.Map(mapContainer, mapOption);
        
        // Use native grab cursor to eliminate slow CDN request for openhand.cur.ico
        map.setCursor('grab');

        kakao.maps.event.addListener(map, 'click', () => {
          sharedOverlay.setMap(null);
        });

        var clusterer = new kakao.maps.MarkerClusterer({
            map: map,
            averageCenter: true,
            minLevel: 10
        });

        var categoryIcons = {
          "한식": "🍚",
          "양식": "🍝",
          "카페": "☕",
          "중식": "🍜",
          "뷰티": "💄",
          "일식": "🍣",
          "베이커리": "🍞",
          "서프샵": "🏄",
          "기타": "📌"
        };

        var allMarkers = [];
        var activeCategories = new Set(Object.keys(categoryIcons));
        var searchTerm = "";
        var sharedOverlay = new kakao.maps.CustomOverlay({
          zIndex: 1000
        });
        var activeSort = 'default';
        var sheet = document.getElementById('bottom-sheet');
        var sheetHandle = document.querySelector('.sheet-handle');
        var sheetStates = ['state-collapsed', 'state-peek', 'state-half', 'state-full'];
        var currentStateIndex = 1; // Start at peek

        function setSheetState(index) {
          currentStateIndex = Math.max(0, Math.min(index, sheetStates.length - 1));
          sheet.className = 'bottom-sheet ' + sheetStates[currentStateIndex];
        }

        // Drag logic
        var isDragging = false;
        var startY = 0;
        var startTranslateY = 0;

        function getTranslateY(el) {
          var style = window.getComputedStyle(el);
          var matrix = new WebKitCSSMatrix(style.transform);
          return matrix.f;
        }

        function startDrag(e) {
          isDragging = true;
          startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
          startTranslateY = getTranslateY(sheet);
          sheet.style.transition = 'none';
        }

        function onDrag(e) {
          if (!isDragging) return;
          var currentY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
          var deltaY = currentY - startY;
          var newTranslateY = Math.max(0, Math.min(window.innerHeight, startTranslateY + deltaY));
          sheet.style.transform = 'translateY(' + newTranslateY + 'px)';
        }

        function endDrag(e) {
          if (!isDragging) return;
          isDragging = false;
          sheet.style.transition = '';
          
          // Determine state based on position
          var currentTranslateY = getTranslateY(sheet);
          var height = window.innerHeight;
          var ratio = 1 - (currentTranslateY / height);
          
          if (ratio > 0.8) setSheetState(3); // full
          else if (ratio > 0.5) setSheetState(2); // half
          else if (ratio > 0.2) setSheetState(1); // peek
          else setSheetState(0); // collapsed
        }

        sheetHandle.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', onDrag);
        window.addEventListener('mouseup', endDrag);
        sheetHandle.addEventListener('touchstart', startDrag);
        window.addEventListener('touchmove', onDrag);
        window.addEventListener('touchend', endDrag);

        sheetHandle.addEventListener('click', function() {
          currentStateIndex = (currentStateIndex + 1) % sheetStates.length;
          setSheetState(currentStateIndex);
        });

        setSheetState(currentStateIndex);

        window.toggleSheet = function() {
          currentStateIndex = (currentStateIndex + 1) % sheetStates.length;
          setSheetState(currentStateIndex);
        };



        function getPrimaryLink(p) {
          try {
            var links = JSON.parse(p.link || '[]');
            if (links.length === 0) return null;
            var redtableLink = links.find(function(l) { return l.source === 'redtable'; });
            return redtableLink ? redtableLink.link : links[0].link;
          } catch (e) {
            return null;
          }
        }

        function getLinksHtml(p) {
          try {
            var links = JSON.parse(p.link || '[]');
            if (links.length === 0) return '';
            
            // Sort: redtable first, then others alphabetically by source
            links.sort(function(a, b) {
              if (a.source === 'redtable') return -1;
              if (b.source === 'redtable') return 1;
              return (a.source || '').localeCompare(b.source || '');
            });
            
            var html = '<div style="margin-top: 8px; border-top: 1px solid #eee; padding-top: 8px;">';
            links.forEach(function(l) {
              var sourceName = l.source === 'redtable' ? 'RedTable (메인)' : (l.source === 'ydp' ? '영등포구청' : (l.source === 'benepia' ? 'Benepia' : esc(l.source)));
              html += '<p style="margin: 2px 0; font-size: 12px;"><a href="' + esc(l.link) + '" target="_blank">🔗 ' + sourceName + '</a></p>';
            });
            html += '</div>';
            return html;
          } catch (e) {
            return '';
          }
        }

        function createPopupContent(p) {
           var categoriesHtml = (p.categories || []).map(cat => 
             '<span class="category-badge cat-' + esc(cat) + '">' + esc(cat) + '</span>'
           ).join('');
          
           var link = getPrimaryLink(p);
           var ctaHtml = link ? '<a href="' + esc(link) + '" target="_blank" class="popup-cta-button">방문하기</a>' : '';
           
           return '<div class="store-popup" onclick="event.stopPropagation();">' +
                  '<h3>' + esc(p.title || 'Untitled') + '</h3>' +
                  '<div>' + categoriesHtml + '</div>' +
                  '<p>📍 ' + esc(p.address) + '</p>' +
                  (p.phone ? '<p>📞 ' + esc(p.phone) + '</p>' : '') +
                  getLinksHtml(p) +
                  ctaHtml +
                  '</div>';
        }

        function openPopup(marker, feature) {
          var p = feature.properties;
          sharedOverlay.setContent(createPopupContent(p));
          sharedOverlay.setPosition(marker.getPosition());
          sharedOverlay.setMap(map);
        }

        fetch('data/map_data.json')
          .then(res => res.json())
          .then(geojson => {
            document.getElementById('status').style.display = 'none';
            
            // Normalize categories for all features
            geojson.features.forEach(feature => {
              var p = feature.properties;
              if (p.category === 'nan') p.category = '기타';
              p.categories = p.category.split(',').map(s => s.trim());
            });
            // Deduplicate features by (title + address) combination
            var seen = new Set();
            geojson.features = geojson.features.filter(function(f) {
              var p = f.properties;
              var key = (p.title || '') + '::' + (p.address || '');
              if (seen.has(key)) return false;
              seen.add(key);
              return true;
            });

            geojson.features.forEach(feature => {
              var p = feature.properties;
              var latlng = new kakao.maps.LatLng(feature.geometry.coordinates[1], feature.geometry.coordinates[0]);
              
                var iconText = categoryIcons[p.categories[0]] || categoryIcons["기타"];
                var catColor = getComputedStyle(document.documentElement).getPropertyValue('--cat-' + (p.categories[0] || '기타') + '-bg').trim() || 'white';
                
                var markerSize = 48;
                var marker = new kakao.maps.Marker({ 
                  position: latlng,
                  image: new kakao.maps.MarkerImage(createEmojiMarkerImage(iconText, catColor, markerSize), new kakao.maps.Size(markerSize, markerSize))
                });
               
               kakao.maps.event.addListener(marker, 'mouseover', () => {
                 marker.setImage(new kakao.maps.MarkerImage(createEmojiMarkerImage(iconText, catColor, markerSize + 8), new kakao.maps.Size(markerSize + 8, markerSize + 8)));
               });
               kakao.maps.event.addListener(marker, 'mouseout', () => {
                 marker.setImage(new kakao.maps.MarkerImage(createEmojiMarkerImage(iconText, catColor, markerSize), new kakao.maps.Size(markerSize, markerSize)));
               });
               
               kakao.maps.event.addListener(marker, 'click', () => {
                 openPopup(marker, feature);
               });
               
               allMarkers.push({ marker, feature });
             });
             
              updateMarkers();
              // Auto-expand sheet on first load
              document.getElementById('bottom-sheet').classList.add('expanded');
            })
           .catch(err => {
            var status = document.getElementById('status');
            status.textContent = '데이터를 불러오는 중 오류가 발생했습니다. 페이지를 새로고침 해주세요.';
            status.style.display = 'block';
            status.style.color = 'red';
          });

        function getDistance(latlng1, latlng2) {
          var R = 6371; // Earth radius in km
          var lat1 = latlng1.getLat() * Math.PI / 180;
          var lat2 = latlng2.getLat() * Math.PI / 180;
          var deltaLat = (latlng2.getLat() - latlng1.getLat()) * Math.PI / 180;
          var deltaLng = (latlng2.getLng() - latlng1.getLng()) * Math.PI / 180;
          var a = Math.sin(deltaLat / 2) * Math.sin(deltaLat / 2) +
                  Math.cos(lat1) * Math.cos(lat2) *
                  Math.sin(deltaLng / 2) * Math.sin(deltaLng / 2);
          var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
          return R * c;
        }

        function updateBottomSheet() {
          var sheetContent = document.getElementById('sheet-content');
          sheetContent.innerHTML = '';
          var filtered = allMarkers.filter(m => {
            var p = m.feature.properties;
            var match = (p.title || '').toLowerCase().includes(searchTerm) || (p.address || '').toLowerCase().includes(searchTerm);
            return match && (p.categories || []).some(function(cat) { return activeCategories.has(cat); });
          });

          // Apply sorting
          if (activeSort === 'coupon') {
            filtered.sort(function(a, b) {
              try {
                var aLinks = JSON.parse(a.feature.properties.link || '[]');
                var bLinks = JSON.parse(b.feature.properties.link || '[]');
                return bLinks.length - aLinks.length;
              } catch(e) { return 0; }
            });
          } else if (activeSort === 'name') {
            filtered.sort(function(a, b) {
              return (a.feature.properties.title || '').localeCompare(b.feature.properties.title || '');
            });
          } else if (activeSort === 'distance') {
            var center = map.getCenter();
            filtered.sort(function(a, b) {
              var aLatLng = new kakao.maps.LatLng(a.feature.geometry.coordinates[1], a.feature.geometry.coordinates[0]);
              var bLatLng = new kakao.maps.LatLng(b.feature.geometry.coordinates[1], b.feature.geometry.coordinates[0]);
              return getDistance(center, aLatLng) - getDistance(center, bLatLng);
            });
          }

          document.getElementById('sheet-store-count').textContent = '매장 (' + filtered.length + ')';
          
          if (filtered.length === 0) {
            sheetContent.innerHTML = '<div style="padding: 20px; text-align: center; color: #666;">검색 결과가 없습니다</div>';
            return;
          }

          filtered.forEach(m => {
            var p = m.feature.properties;
            var latlng = new kakao.maps.LatLng(m.feature.geometry.coordinates[1], m.feature.geometry.coordinates[0]);
            
            var categoriesHtml = (p.categories || []).map(cat => 
              '<span class="category-badge cat-' + esc(cat) + '">' + esc(cat) + '</span>'
            ).join('');

            var iconEmoji = categoryIcons[p.categories[0]] || categoryIcons["기타"];

            var card = document.createElement('div');
            card.className = 'store-card';
            var catColor = getComputedStyle(document.documentElement).getPropertyValue('--cat-' + (p.categories[0] || '기타') + '-bg').trim() || 'white';
            card.innerHTML = '<div class="card-thumb"><img src="' + createEmojiMarkerImage(iconEmoji, catColor, 80) + '" alt=""></div>' +
                             '<div class="card-info">' +
                             '<h3>' + esc(p.title || 'Untitled') + '</h3>' +
                             '<div>' + categoriesHtml + '</div>' +
                             '<p>' + esc(p.address || '') + '</p>' +
                             '</div>';
            card.onclick = (e) => {
              map.setCenter(latlng);
              map.setLevel(5);
              openPopup(m.marker, m.feature);
            };
            sheetContent.appendChild(card);
          });
        }

        function updateMarkers() {
          clusterer.clear();
          var filtered = allMarkers.filter(m => {
            var p = m.feature.properties;
            var match = (p.title || '').toLowerCase().includes(searchTerm) || (p.address || '').toLowerCase().includes(searchTerm);
            return match && (p.categories || []).some(cat => activeCategories.has(cat));
          });
          clusterer.addMarkers(filtered.map(m => m.marker));
          
          if (filtered.length > 0) {
            var bounds = new kakao.maps.LatLngBounds();
            filtered.forEach(m => bounds.extend(m.marker.getPosition()));
            map.setBounds(bounds);
          } else {
            // Show toast/overlay
            var status = document.getElementById('status');
            status.textContent = '검색 결과가 없습니다';
            status.style.display = 'block';
            setTimeout(() => { status.style.display = 'none'; }, 2000);
          }
          
          updateBottomSheet();
          updateCategoryPills();
        }



        function updateCategoryPills() {
          var pillRow = document.getElementById('category-pill-row');
          pillRow.innerHTML = '';
          Object.keys(categoryIcons).forEach(function(cat) {
            var pill = document.createElement('div');
            pill.className = 'category-pill' + (activeCategories.has(cat) ? ' active' : '');
            pill.innerHTML = '<span>' + categoryIcons[cat] + '</span> ' + cat;
            pill.onclick = function(e) {
              if (activeCategories.has(cat)) {
                activeCategories.delete(cat);
              } else {
                activeCategories.add(cat);
              }
              updateMarkers();
            };
            pillRow.appendChild(pill);
          });
        }

        var searchInput = document.getElementById('search-input');
        var clearSearch = document.getElementById('clear-search');
        var debounceTimer;

        

        searchInput.oninput = (e) => {
          clearSearch.style.display = e.target.value ? 'block' : 'none';
          
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(() => {
            searchTerm = e.target.value.toLowerCase();
            updateMarkers();
          }, 300);
        };

        clearSearch.onclick = () => {
          searchInput.value = '';
          clearSearch.style.display = 'none';
          searchTerm = '';
          updateMarkers();
        };

        // Wire up bottom sheet handle
        document.querySelector('.sheet-handle').onclick = function() {
          window.toggleSheet();
        };

        // Wire up sort tabs
        var sortTabs = document.querySelectorAll('.sheet-tab');
        sortTabs.forEach(function(tab) {
          tab.onclick = function() {
            sortTabs.forEach(function(t) { t.classList.remove('active'); });
            tab.classList.add('active');
            activeSort = tab.getAttribute('data-sort');
            updateBottomSheet();
          };
        });
      })();
    });
  </script>
</body>
</html>
