<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Table Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #map { width: 100%; height: 100%; }
    .popup-content h3 { margin: 0 0 6px; font-size: 15px; color: #c0392b; }
    .popup-content p { margin: 2px 0; font-size: 13px; color: #333; }
    .popup-content .label { font-weight: 600; color: #555; }
    .popup-content a { color: #2980b9; text-decoration: none; }
    .popup-content a:hover { text-decoration: underline; }
    .popup-content .category { display: inline-block; background: #e74c3c; color: #fff; padding: 1px 8px; border-radius: 10px; font-size: 11px; margin-bottom: 4px; }
    #status { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #fff; padding: 6px 16px; border-radius: 6px; font-size: 13px; z-index: 1000; display: none; }
    .sidebar-item { cursor: pointer; padding: 10px; border-bottom: 1px solid #eee; }
    .sidebar-item:hover { background: #f9f9f9; }
    .sidebar-item h3 { font-size: 15px; margin: 0 0 4px; }
    .sidebar-item p { font-size: 12px; color: #666; margin: 0; }
    
    #sidebar { position: absolute; top: 0; left: 0; width: 300px; height: 100%; background: white; z-index: 1000; box-shadow: 2px 0 5px rgba(0,0,0,0.1); transition: transform 0.3s; }
    #sidebar.collapsed { transform: translateX(-100%); }
    .sidebar-tabs { width: 40px; height: 100%; background: #f0f0f0; float: left; }
    .sidebar-content { margin-left: 40px; height: 100%; overflow-y: auto; }
    .sidebar-pane { padding: 15px; }
    .sidebar-header { font-size: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; }
    .sidebar-close { cursor: pointer; }
    
    #search-container { position: absolute; top: 10px; left: 50px; z-index: 1000; }
    #search-input { padding: 8px; width: 200px; }
  </style>
</head>
<body>
  <div id="sidebar" class="collapsed">
    <div class="sidebar-tabs">
      <div onclick="toggleSidebar()">☰</div>
      <div onclick="toggleSidebar('filter')">🏷️</div>
    </div>
    <div class="sidebar-content">
      <div class="sidebar-pane" id="home">
        <div class="sidebar-header">
          Stores
          <span class="sidebar-close" onclick="toggleSidebar()">◀</span>
        </div>
        <div id="sidebar-content"></div>
      </div>
      <div class="sidebar-pane" id="filter" style="display:none;">
        <div class="sidebar-header">
          Filter
          <span class="sidebar-close" onclick="toggleSidebar()">◀</span>
        </div>
        <div id="filter-content"></div>
      </div>
    </div>
  </div>
  
  <div id="search-container">
    <input type="text" id="search-input" placeholder="Search...">
  </div>
  
  <div id="map"></div>
  <div id="status">Loading map data...</div>
  
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=608c740734f775a41a0b360ae3c5f32b&libraries=services,clusterer&autoload=false"></script>
  <script>
    kakao.maps.load(function() {
      (function () {
        var mapContainer = document.getElementById('map'),
            mapOption = { 
                center: new kakao.maps.LatLng(37.535, 126.897),
                level: 13,
                maxZoom: 20
            };
        var map = new kakao.maps.Map(mapContainer, mapOption);
        var clusterer = new kakao.maps.MarkerClusterer({
            map: map,
            averageCenter: true,
            minLevel: 10
        });

        var categoryIcons = {
          "한식": "🍚",
          "양식": "🍝",
          "카페": "☕",
          "중식": "🍜",
          "뷰티": "💄",
          "기타": "📌"
        };

        var allMarkers = [];
        var activeCategories = new Set(Object.keys(categoryIcons));
        var searchTerm = "";

        window.toggleSidebar = function(pane) {
          var sidebar = document.getElementById('sidebar');
          sidebar.classList.toggle('collapsed');
          var targetPane = pane || 'home';
          document.getElementById('home').style.display = targetPane === 'home' ? 'block' : 'none';
          document.getElementById('filter').style.display = targetPane === 'filter' ? 'block' : 'none';
        };

        function getPrimaryLink(p) {
          try {
            var links = JSON.parse(p.link || '[]');
            return links.length > 0 ? links[0].link : null;
          } catch (e) {
            return null;
          }
        }

        function esc(str) {
          var div = document.createElement('div');
          div.appendChild(document.createTextNode(str || ''));
          return div.innerHTML;
        }

        fetch('data/map_data.json')
          .then(res => res.json())
          .then(geojson => {
            document.getElementById('status').style.display = 'none';
            var sidebarContent = document.getElementById('sidebar-content');
            
            geojson.features.forEach(feature => {
              var p = feature.properties;
              var latlng = new kakao.maps.LatLng(feature.geometry.coordinates[1], feature.geometry.coordinates[0]);
              
              var iconText = categoryIcons[p.category] || categoryIcons["기타"];
              var customOverlay = new kakao.maps.CustomOverlay({
                position: latlng,
                content: '<div style="font-size: 20px; background: white; border-radius: 50%; padding: 2px;">' + iconText + '</div>'
              });
              
              var marker = new kakao.maps.Marker({ position: latlng });
              
               var infoWindow = new kakao.maps.InfoWindow({
                 content: '<div class="popup-content" style="padding:10px;"><h3>' + (p.title || 'Untitled') + '</h3>' +
                          '<span class="category">' + (p.category || '기타') + '</span>' +
                          '<p><span class="label">Address:</span> ' + esc(p.address) + '</p>' +
                          '<p><span class="label">Phone:</span> ' + esc(p.phone) + '</p>' +
                          '<p><a href="' + (getPrimaryLink(p) || '#') + '" target="_blank">View Store</a></p></div>'
               });

              kakao.maps.event.addListener(marker, 'click', () => {
                infoWindow.open(map, marker);
              });

               allMarkers.push({ marker, feature, infoWindow });
               
               updateMarkers();
             });
             
             updateMarkers();
           });

        function updateSidebar() {
          var sidebarContent = document.getElementById('sidebar-content');
          sidebarContent.innerHTML = '';
          var filtered = allMarkers.filter(m => {
            var p = m.feature.properties;
            var match = (p.title || '').toLowerCase().includes(searchTerm) || (p.address || '').toLowerCase().includes(searchTerm);
            return match && activeCategories.has(p.category || "기타");
          });
          filtered.forEach(m => {
            var p = m.feature.properties;
            var latlng = new kakao.maps.LatLng(m.feature.geometry.coordinates[1], m.feature.geometry.coordinates[0]);
            var link = getPrimaryLink(p);
            var item = document.createElement('div');
            item.className = 'sidebar-item';
            var linkHtml = link ? '<a href="' + link + '" target="_blank">' + (p.title || 'Untitled') + '</a>' : (p.title || 'Untitled');
            item.innerHTML = '<h3>' + linkHtml + '</h3><p>' + (p.address || '') + '</p>';
            item.onclick = (e) => {
              if (e.target.tagName !== 'A') {
                map.setCenter(latlng);
                map.setLevel(5);
                m.infoWindow.open(map, m.marker);
              }
            };
            sidebarContent.appendChild(item);
          });
        }

        function updateMarkers() {
          clusterer.clear();
          var filtered = allMarkers.filter(m => {
            var p = m.feature.properties;
            var match = (p.title || '').toLowerCase().includes(searchTerm) || (p.address || '').toLowerCase().includes(searchTerm);
            return match && activeCategories.has(p.category || "기타");
          });
          clusterer.addMarkers(filtered.map(m => m.marker));
          updateSidebar();
        }

        var filterContent = document.getElementById('filter-content');
        Object.keys(categoryIcons).forEach(cat => {
          var label = document.createElement('label');
          label.style.display = 'block';
          label.innerHTML = '<input type="checkbox" checked value="' + cat + '"> ' + cat;
          label.querySelector('input').onchange = (e) => {
            if (e.target.checked) activeCategories.add(cat);
            else activeCategories.delete(cat);
            updateMarkers();
          };
          filterContent.appendChild(label);
        });

        document.getElementById('search-input').oninput = (e) => {
          searchTerm = e.target.value.toLowerCase();
          updateMarkers();
        };
      })();
    });
  </script>
</body>
</html>
