<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Table Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-sidebar-v2@3.2.3/css/leaflet-sidebar.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-search@4.0.0/dist/leaflet-search.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.locatecontrol@0.81.1/dist/L.Control.Locate.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #map { width: 100%; height: 100%; }
    .popup-content h3 { margin: 0 0 6px; font-size: 15px; color: #c0392b; }
    .popup-content p { margin: 2px 0; font-size: 13px; color: #333; }
    .popup-content .label { font-weight: 600; color: #555; }
    .popup-content a { color: #2980b9; text-decoration: none; }
    .popup-content a:hover { text-decoration: underline; }
    .popup-content .category { display: inline-block; background: #e74c3c; color: #fff; padding: 1px 8px; border-radius: 10px; font-size: 11px; margin-bottom: 4px; }
    #status { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #fff; padding: 6px 16px; border-radius: 6px; font-size: 13px; z-index: 1000; display: none; }
    .sidebar-item { cursor: pointer; padding: 10px; border-bottom: 1px solid #eee; }
    .sidebar-item:hover { background: #f9f9f9; }
    .sidebar-item h3 { font-size: 15px; margin: 0 0 4px; }
    .sidebar-item p { font-size: 12px; color: #666; margin: 0; }
  </style>
</head>
<body>
  <div id="sidebar" class="leaflet-sidebar collapsed">
    <div class="leaflet-sidebar-tabs">
      <ul role="tablist">
        <li><a href="#home" role="tab">☰</a></li>
        <li><a href="#filter" role="tab">🏷️</a></li>
      </ul>
    </div>
    <div class="leaflet-sidebar-content">
      <div class="leaflet-sidebar-pane" id="home">
        <h1 class="leaflet-sidebar-header">
          Stores
          <span class="leaflet-sidebar-close">◀</span>
        </h1>
        <div id="sidebar-content"></div>
      </div>
      <div class="leaflet-sidebar-pane" id="filter">
        <h1 class="leaflet-sidebar-header">
          Filter
          <span class="leaflet-sidebar-close">◀</span>
        </h1>
        <div id="filter-content"></div>
      </div>
    </div>
  </div>
  <div id="map" class="leaflet-sidebar-map"></div>
  <div id="status">Loading map data...</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet-sidebar-v2@3.2.3/js/leaflet-sidebar.min.js"></script>
  <script src="https://unpkg.com/leaflet-search@4.0.0/dist/leaflet-search.min.js"></script>
  <script src="https://unpkg.com/leaflet.locatecontrol@0.81.1/dist/L.Control.Locate.min.js"></script>
  <script>
    (function () {
      var map = L.map('map', { zoomControl: true }).setView([37.535, 126.897], 13);
      var sidebar = L.control.sidebar({
        container: 'sidebar',
        position: 'left'
      }).addTo(map);


      L.control.locate({
        position: 'topleft',
        strings: {
          title: "Show me where I am"
        }
      }).addTo(map);

      // Category mapping to icons
      var categoryIcons = {
        "한식": "🍚",
        "양식": "🍝",
        "카페": "☕",
        "중식": "🍜",
        "뷰티": "💄",
        "기타": "📌"
      };

      // 마커 클러스터링 설정 (동일 좌표 이슈 대응)
      var markers = L.markerClusterGroup({ 
        maxClusterRadius: 40, 
        disableClusteringAtZoom: 17,
        spiderfyOnMaxZoom: true,
        spiderfyDistanceMultiplier: 2.0,
        zoomToBoundsOnClick: false,
        animate: false
      });

      markers.on('clusterclick', function (a) {
        var bounds = a.layer.getBounds();
        // 동일 좌표인 경우 (bounds가 유효하지 않음) spiderfy 호출
        if (!bounds.isValid()) {
          a.layer.spiderfy();
        } else {
          a.layer.zoomToBounds({ padding: [30, 30] });
        }
      });


      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(map);

      var status = document.getElementById('status');
      status.style.display = 'block';

      function esc(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str || ''));
        return div.innerHTML;
      }

      fetch('data/map_data.json')
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function (geojson) {
          status.style.display = 'none';

          var sidebarContent = document.getElementById('sidebar-content');

          var geoJsonLayer = L.geoJSON(geojson, {
            pointToLayer: function (feature, latlng) {
              var category = feature.properties.category || "기타";
              var iconText = categoryIcons[category] || categoryIcons["기타"];
              
              var icon = L.divIcon({
                className: 'custom-icon',
                html: '<div style="font-size: 20px; line-height: 20px; text-align: center;">' + iconText + '</div>',
                iconSize: [20, 20]
              });
              
              return L.marker(latlng, { icon: icon });
            },
            onEachFeature: function (feature, layer) {
              var p = feature.properties || {};
              feature.properties.searchField = (p.title || '') + '|' + (p.address || '');
              // Use DOM methods for safe rendering instead of innerHTML
              var popupDiv = document.createElement('div');
              popupDiv.className = 'popup-content';
              
              var title = document.createElement('h3');
              title.textContent = p.title || 'Untitled';
              popupDiv.appendChild(title);
              
              if (p.category) {
                var catSpan = document.createElement('span');
                catSpan.className = 'category';
                catSpan.textContent = p.category;
                popupDiv.appendChild(catSpan);
              }
              
              if (p.address) {
                var addrP = document.createElement('p');
                addrP.innerHTML = '<span class="label">Address:</span> ' + esc(p.address);
                popupDiv.appendChild(addrP);
              }
              
              if (p.phone) {
                var phoneP = document.createElement('p');
                phoneP.innerHTML = '<span class="label">Phone:</span> ' + esc(p.phone);
                popupDiv.appendChild(phoneP);
              }
              
              if (p.link) {
                  var linkP = document.createElement('p');
                  linkP.innerHTML = '<span class="label">Link:</span> ';
                  try {
                    var links = JSON.parse(p.link);
                    links.forEach(function(item, i) {
                      var a = document.createElement('a');
                      a.href = item.link;
                      a.target = '_blank';
                      a.rel = 'noopener';
                      a.textContent = item.source;
                      linkP.appendChild(a);
                      if (i < links.length - 1) linkP.appendChild(document.createTextNode(', '));
                    });
                  } catch (e) {
                      var a = document.createElement('a');
                      a.href = p.link;
                      a.target = '_blank';
                      a.rel = 'noopener';
                      a.textContent = 'Visit';
                      linkP.appendChild(a);
                  }
                  popupDiv.appendChild(linkP);
              }
              layer.bindPopup(popupDiv, { maxWidth: 300 });

              // Add to sidebar
              var item = document.createElement('div');
              item.className = 'sidebar-item';
              
              var itemTitle = document.createElement('h3');
              itemTitle.textContent = p.title || 'Untitled';
              item.appendChild(itemTitle);
              
              var itemAddr = document.createElement('p');
              itemAddr.textContent = p.address || '';
              item.appendChild(itemAddr);
              
              item.onclick = function() {
                markers.zoomToShowLayer(layer, function() {
                  layer.openPopup();
                });
                sidebar.close();
              };
              sidebarContent.appendChild(item);
            }
          });
          
          markers.addLayer(geoJsonLayer);
          map.addLayer(markers);

          map.addControl(new L.Control.Search({
            layer: geoJsonLayer,
            propertyName: 'searchField',
            initial: false,
            zoom: 17,
            buildTip: function(textVal, key) {
                var parts = key.split('|');
                return '<div>' + parts[0] + ' <small>' + parts[1] + '</small></div>';
            }
          }));

          var filterContent = document.getElementById('filter-content');
          var categories = Object.keys(categoryIcons);
          var activeCategories = new Set(categories);

          categories.forEach(function(cat) {
            var label = document.createElement('label');
            label.style.display = 'block';
            label.style.padding = '10px';
            label.style.borderBottom = '1px solid #eee';
            label.innerHTML = '<input type="checkbox" checked value="' + cat + '"> ' + cat;
            label.querySelector('input').onchange = function(e) {
              if (e.target.checked) {
                activeCategories.add(cat);
              } else {
                activeCategories.delete(cat);
              }
              updateMarkers();
            };
            filterContent.appendChild(label);
          });

          function updateMarkers() {
            geoJsonLayer.eachLayer(function(layer) {
              var shouldShow = activeCategories.has(layer.feature.properties.category || "기타");
              var inCluster = markers.hasLayer(layer);
              if (shouldShow && !inCluster) {
                markers.addLayer(layer);
              } else if (!shouldShow && inCluster) {
                markers.removeLayer(layer);
              }
            });
            // 줌/이동 애니메이션 종료 후 상태 동기화 강제
            setTimeout(function() {
                markers.refreshClusters();
            }, 300);
          }

          if (markers.getLayers().length > 0) {
            map.fitBounds(markers.getBounds().pad(0.1));
          }
        })
        .catch(function (err) {
          status.textContent = 'Failed to load map data: ' + err.message;
          status.style.background = 'rgba(180,0,0,0.85)';
        });
    })();
  </script>
</body>
</html>
