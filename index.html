<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Table Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #map { width: 100%; height: 100%; }
    .popup-content h3 { margin: 0 0 6px; font-size: 15px; color: #c0392b; }
    .popup-content p { margin: 2px 0; font-size: 13px; color: #333; }
    .popup-content .label { font-weight: 600; color: #555; }
    .popup-content a { color: #2980b9; text-decoration: none; }
    .popup-content a:hover { text-decoration: underline; }
    .popup-content .category { display: inline-block; background: #e74c3c; color: #fff; padding: 1px 8px; border-radius: 10px; font-size: 11px; margin-bottom: 4px; }
    #status { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #fff; padding: 6px 16px; border-radius: 6px; font-size: 13px; z-index: 1000; display: none; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="status">Loading map data...</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script>
    (function () {
      var map = L.map('map', { zoomControl: true }).setView([37.535, 126.897], 13);
      var markers = L.markerClusterGroup({ maxClusterRadius: 50, disableClusteringAtZoom: 16 });

      // Category mapping to icons
      var categoryIcons = {
        "한식": "🍚",
        "양식": "🍝",
        "카페": "☕",
        "중식": "🍜",
        "뷰티": "💄",
        "기타": "📌"
      };

      // 마커 클러스터링 설정 (동일 좌표 이슈 대응)
      var markers = L.markerClusterGroup({ 
        maxClusterRadius: 50, 
        disableClusteringAtZoom: 16,
        spiderfyOnMaxZoom: true 
      });

      markers.on('clusterclick', function (a) {
        var bounds = a.layer.getBounds();
        // 동일 좌표인 경우 (bounds가 유효하지 않음) spiderfy 호출
        if (!bounds.isValid()) {
          a.layer.spiderfy();
        } else {
          a.layer.zoomToBounds({ padding: [30, 30] });
        }
      });


      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(map);

      var status = document.getElementById('status');
      status.style.display = 'block';

      function esc(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str || ''));
        return div.innerHTML;
      }

      fetch('data/map_data.json')
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function (geojson) {
          status.style.display = 'none';

          var geoJsonLayer = L.geoJSON(geojson, {
            pointToLayer: function (feature, latlng) {
              var category = feature.properties.category || "기타";
              var iconText = categoryIcons[category] || categoryIcons["기타"];
              
              var icon = L.divIcon({
                className: 'custom-icon',
                html: '<div style="font-size: 20px; line-height: 20px; text-align: center;">' + iconText + '</div>',
                iconSize: [20, 20]
              });
              
              return L.marker(latlng, { icon: icon });
            },
            onEachFeature: function (feature, layer) {
              var p = feature.properties || {};
              var html = '<div class="popup-content">';
              html += '<h3>' + esc(p.title || 'Untitled') + '</h3>';
              if (p.category) html += '<span class="category">' + esc(p.category) + '</span>';
              if (p.address) html += '<p><span class="label">Address:</span> ' + esc(p.address) + '</p>';
              if (p.phone)   html += '<p><span class="label">Phone:</span> ' + esc(p.phone) + '</p>';
              if (p.link) {
                  // Handle pipe-separated links
                  var links = p.link.split('|');
                  html += '<p><span class="label">Link:</span> ';
                  links.forEach(function(link, i) {
                    html += '<a href="' + esc(link) + '" target="_blank" rel="noopener">Link ' + (i+1) + '</a>' + (i < links.length - 1 ? ', ' : '');
                  });
                  html += '</p>';
              }
              html += '</div>';
              layer.bindPopup(html, { maxWidth: 300 });
            }
          });
          
          markers.addLayer(geoJsonLayer);
          map.addLayer(markers);

          if (markers.getLayers().length > 0) {
            map.fitBounds(markers.getBounds().pad(0.1));
          }
        })
        .catch(function (err) {
          status.textContent = 'Failed to load map data: ' + err.message;
          status.style.background = 'rgba(180,0,0,0.85)';
        });
    })();
  </script>
</body>
</html>
